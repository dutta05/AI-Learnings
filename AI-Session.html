    box-shadow: var(--shadow);
  }
  .quiz-question {
    font-size: 1.15rem; font-weight: 600; color: var(--text);
    margin-bottom: 1.2rem;
  }
  .quiz-options { display: flex; flex-direction: column; gap: 0.6rem; }
  .quiz-option {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text); padding: 0.85rem 1.1rem;
    border-radius: 10px; cursor: pointer; text-align: left;
    font-size: 0.95rem; transition: all 0.2s;
  }
  .quiz-option:hover:not(:disabled) {
    background: var(--primary-soft);
    border-color: var(--primary);
  }
  .quiz-option.correct {
    background: #d1fae5; border-color: var(--success); color: #065f46;
  }
  .quiz-option.wrong {
    background: #fee2e2; border-color: var(--danger); color: #991b1b;
  }
  .quiz-progress {
    display: flex; justify-content: space-between;
    margin-bottom: 1rem; color: var(--text-muted); font-size: 0.9rem;
  }
  .quiz-score {
    text-align: center; padding: 2rem;
    background: var(--gradient); border-radius: 14px;
    margin-top: 1rem;
  }
  .quiz-score h3 { color: white; font-size: 2.2rem; }
  .quiz-score p { color: white; }
  .industry-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 1rem; margin-top: 1.5rem;
  }
  .industry {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 1.3rem;
    box-shadow: var(--shadow-sm); transition: all 0.3s;
  }
  .industry:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
  .industry-icon { font-size: 1.8rem; margin-bottom: 0.5rem; }
  .industry h4 { color: var(--text); margin-bottom: 0.4rem; font-size: 1rem; }
  .industry p { font-size: 0.85rem; margin: 0; }
  .copilot-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; margin-top: 1.5rem;
  }
  .copilot-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 1.5rem;
    box-shadow: var(--shadow-sm);
  }
  .copilot-card.can { border-left: 4px solid var(--success); }
  .copilot-card.cannot { border-left: 4px solid var(--danger); }
  .copilot-card ul { list-style: none; padding: 0; margin-top: 0.8rem; }
  .copilot-card li {
    padding: 0.45rem 0; color: var(--text-muted);
    font-size: 0.9rem; display: flex; align-items: start; gap: 0.5rem;
  }
  .copilot-card.can li::before { content: '✓'; color: var(--success); font-weight: 700; }
  .copilot-card.cannot li::before { content: '✗'; color: var(--danger); font-weight: 700; }
  .demo-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 1.5rem; margin-top: 1rem;
    box-shadow: var(--shadow-sm);
  }
  .demo-card h3 { display: flex; align-items: center; gap: 0.5rem; }
  .demo-prompt {
    background: var(--bg-alt); border-left: 3px solid var(--primary);
    padding: 1rem; border-radius: 8px; margin-top: 0.8rem;
    font-family: 'Courier New', monospace; font-size: 0.85rem;
    color: var(--text); white-space: pre-wrap; line-height: 1.6;
  }
  footer {
    text-align: center; padding: 3rem 2rem;
    border-top: 1px solid var(--border);
    margin-top: 3rem; color: var(--text-muted);
    background: var(--card);
  }
  .footer-quote {
    font-style: italic; color: var(--text);
    max-width: 600px; margin: 0 auto 1rem;
    font-size: 1.05rem;
  }
  .footer-pillars {
    display: flex; justify-content: center; gap: 2rem;
    margin-top: 1.5rem; flex-wrap: wrap;
  }
  .pillar { text-align: center; }
  .pillar-icon { font-size: 2rem; margin-bottom: 0.3rem; }
  .pillar-label { font-weight: 600; color: var(--text); font-size: 0.9rem; }
  @media (max-width: 768px) {
    section { padding: 2rem 1rem; }
    .spectrum { flex-direction: column; }
    .spectrum-item { border-right: none; border-bottom: 1px solid var(--border); }
    .compare-grid, .copilot-grid { grid-template-columns: 1fr; }
    .mindmap-svg { height: 400px; }
  }
</style>
</head>
<body>
<div class="bg-pattern"></div>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const Nav = ({ current, setCurrent }) => {
  const sections = [
    { id: 'home', label: '🏠 Home' },
    { id: 'timeline', label: '📈 Adoption' },
    { id: 'myths', label: '🎭 Myths' },
    { id: 'how', label: '⚙️ How AI Works' },
    { id: 'types', label: '🧠 AI Types' },
    { id: 'spectrum', label: '🌊 Spectrum' },
    { id: 'universe', label: '🌌 Universe' },
    { id: 'genai', label: '🎨 Gen vs Pred' },
    { id: 'data', label: '💾 Data & LLM' },
    { id: 'copilot', label: '🚀 Co-Pilot' },
    { id: 'prompt', label: '✍️ Prompts' },
    { id: 'demos', label: '🎬 Demos' },
    { id: 'cases', label: '🏢 Industries' },
    { id: 'risks', label: '🚨 Risks' },
    { id: 'social', label: '🤝 Social Good' },
    { id: 'quiz', label: '🎯 Quiz' },
  ];
  return (
    <nav>
      <div className="nav-inner">
        <div className="logo">
          <div className="logo-icon">⚡</div>
          AI Fundamentals
        </div>
        <div className="nav-links">
          {sections.map(s => (
            <button
              key={s.id}
              className={`nav-btn ${current === s.id ? 'active' : ''}`}
              onClick={() => setCurrent(s.id)}
            >{s.label}</button>
          ))}
        </div>
      </div>
    </nav>
  );
};

const Home = ({ setCurrent }) => (
  <section className="hero">
    <div className="hero-badge">🎓 90-Minute Interactive Orientation</div>
    <h1>AI Awareness & Fundamentals</h1>
    <p className="hero-sub">
      Understanding Artificial Intelligence for Karuna Fellows and Program Leaders.
      An engaging journey through AI — with simple analogies, hands-on demos, and real-world applications for social impact.
    </p>
    <button className="cta-btn" onClick={() => setCurrent('timeline')}>
      Let's Begin 🚀
    </button>
    <div className="card-grid" style={{ marginTop: '3rem' }}>
      <div className="card">
        <div className="card-icon">💡</div>
        <h3>Simple Analogies</h3>
        <p>Learn AI through everyday comparisons — like a GPS that needs your destination.</p>
      </div>
      <div className="card">
        <div className="card-icon teal">🎮</div>
        <h3>Hands-On Demos</h3>
        <p>Try prompt engineering live — from synthesizing reports to analyzing dashboards.</p>
      </div>
      <div className="card">
        <div className="card-icon green">🌌</div>
        <h3>Interactive Mindmap</h3>
        <p>Explore the AI Universe through a clickable, visual mindmap of concepts.</p>
      </div>
      <div className="card">
        <div className="card-icon pink">🎯</div>
        <h3>Grand Finale Quiz</h3>
        <p>Test your understanding with fun, bite-sized questions at the end.</p>
      </div>
    </div>
  </section>
);

const Timeline = () => {
  const data = [
    { year: '1876', name: 'Phone', time: '~75 years' },
    { year: '1920', name: 'Radio', time: '~38 years' },
    { year: '1927', name: 'TV', time: '~22 years' },
    { year: '1967', name: 'ATM', time: '~18 years' },
    { year: '1975', name: 'PC', time: '~14 years' },
    { year: '1983', name: 'Mobile', time: '~16 years' },
    { year: '1991', name: 'Internet', time: '~7 years' },
    { year: '2004', name: 'FB / YouTube', time: '~4.5 years' },
    { year: '2009', name: 'WhatsApp / Uber', time: '~3 years' },
    { year: '2022', name: 'AI (GenAI)', time: '~2 months! ⚡', highlight: true },
  ];
  return (
    <section>
      <h2>📈 Technology Adoption Over Time</h2>
      <p className="section-sub">Time taken to reach 10 Crore (100 Million) users. Notice the acceleration?</p>
      <div className="timeline">
        {data.map((d, i) => (
          <div key={i} className={`timeline-item ${d.highlight ? 'highlight' : ''}`}>
            <div className="tl-year">{d.year}</div>
            <div className="tl-name">{d.name}</div>
            <div className="tl-time">{d.time}</div>
          </div>
        ))}
      </div>
      <div className="card" style={{ marginTop: '2rem', background: 'var(--gradient)', color: 'white' }}>
        <h3 style={{ color: 'white' }}>💭 The Big Question</h3>
        <p style={{ color: 'white', fontSize: '1.05rem', margin: 0 }}>
          Given this global pace of adoption — the question is not <em>"Are we ready?"</em>
          but <strong>"How do we begin today?"</strong>
        </p>
      </div>
    </section>
  );
};

const Myths = () => {
  const [flipped, setFlipped] = useState({});
  const myths = [
    { myth: 'AI will replace the entire workforce', fact: 'AI handles routine tasks so teams can focus on what matters most — people!' },
    { myth: 'AI is only for tech experts', fact: 'If you can use a smartphone, you can use AI tools!' },
    { myth: 'AI thinks like a human', fact: 'AI does not have consciousness, intent, or understanding.' },
    { myth: 'AI is dangerous for humans', fact: "You've been using AI without realizing it — in search, email filters, navigation!" },
  ];
  return (
    <section>
      <h2>🎭 AI Myths vs. Facts</h2>
      <p className="section-sub">Click each card to reveal the reality behind common misconceptions.</p>
      <div className="card-grid">
        {myths.map((m, i) => (
          <div
            key={i}
            className={`flip-card ${flipped[i] ? 'flipped' : ''}`}
            onClick={() => setFlipped({ ...flipped, [i]: !flipped[i] })}
          >
            <div className="flip-inner">
              <div className="flip-front">
                <h3>❌ Myth #{i+1}</h3>
                <p style={{ color: 'var(--danger)' }}>{m.myth}</p>
                <div className="flip-hint">Tap to reveal →</div>
              </div>
              <div className="flip-back">
                <h3>✅ Reality</h3>
                <p style={{ color: 'var(--success)' }}>{m.fact}</p>
                <div className="flip-hint">Tap to flip back</div>
              </div>
            </div>
          </div>
        ))}
      </div>
      <div className="card" style={{ marginTop: '2rem' }}>
        <h3>🧭 Simple Analogy</h3>
        <p>
          <strong>AI is like a GPS navigation system.</strong> It knows every map, road, and shortcut
          in the world — but it still needs <em>you</em> to input the final destination and stay behind
          the wheel to drive the car.
        </p>
      </div>
    </section>
  );
};

const HowAI = () => (
  <section>
    <h2>⚙️ How AI Works: The 3-Step Process</h2>
    <p className="section-sub">If you know how a child learns, you can understand how AI learns.</p>
    <div className="steps">
      <div className="step">
        <div className="step-num">1</div>
        <h3>📊 Data</h3>
        <p>AI is given millions of examples — text, images, sounds, or structured data.</p>
      </div>
      <div className="step">
        <div className="step-num">2</div>
        <h3>🧠 Learning</h3>
        <p>AI finds patterns and learns. Show examples → Correct mistakes → Learning outcomes.</p>
      </div>
      <div className="step">
        <div className="step-num">3</div>
        <h3>🎯 Output</h3>
        <p>AI helps with new tasks — predicting, classifying, generating, or recommending.</p>
      </div>
    </div>
    <div className="card" style={{ marginTop: '2rem' }}>
      <h3>🔑 Key Insight</h3>
      <p>
        AI predicts the most probable next output based on patterns in data — <strong>nothing more, nothing less</strong>.
        It is mathematics, statistics, and computing power applied to large amounts of data.
      </p>
    </div>
  </section>
);

const Types = () => {
  const [active, setActive] = useState(0);
  const types = [
    { name: 'Narrow AI (ANI)', tag: 'TODAY', color: 'var(--gradient)',
      desc: 'Excels at one specific task. Cannot transfer knowledge across domains.',
      examples: ['Siri', 'Alexa', 'ChatGPT', 'Netflix Recommendations', 'Spam Filters'] },
    { name: 'General AI (AGI)', tag: 'THE GOAL', color: 'var(--gradient-2)',
      desc: 'Human-level intelligence across any domain. Can learn and reason. Does not exist yet — estimated 10-50 years away.',
      examples: ['Active research area', 'Future milestone'] },
    { name: 'Super AI (ASI)', tag: 'HYPOTHETICAL', color: 'var(--gradient-5)',
      desc: 'Intelligence that surpasses human brains in every field. Subject of debate and science fiction.',
      examples: ['Long-term speculation', 'Sci-fi staple'] },
  ];
  return (
    <section>
      <h2>🧠 The Three Types of AI</h2>
      <p className="section-sub">Reality check: Every AI tool you use today — from ChatGPT to Netflix — is Narrow AI.</p>
      <div className="spectrum">
        {types.map((t, i) => (
          <div key={i} className={`spectrum-item ${active === i ? 'active' : ''}`} onClick={() => setActive(i)}>
            <h4>{t.tag}</h4>
            <p>{t.name}</p>
          </div>
        ))}
      </div>
      <div className="card" style={{ marginTop: '1.5rem' }}>
        <h3>{types[active].name}</h3>
        <p>{types[active].desc}</p>
        <div style={{ marginTop: '0.8rem' }}>
          {types[active].examples.map((e, i) => (
            <span key={i} className="chip">{e}</span>
          ))}
        </div>
      </div>
    </section>
  );
};

const Spectrum = () => {
  const [active, setActive] = useState(0);
  const items = [
    { name: 'Rule-Based', desc: 'Hard-coded if-then rules. No learning capability.',
      example: 'Spam filters with keyword lists', color: '#f59e0b' },
    { name: 'Machine Learning', desc: 'Learns patterns from data automatically.',
      example: 'Netflix recommendations', color: '#3b82f6' },
    { name: 'Deep Learning', desc: 'Neural networks with many layers.',
      example: 'Face recognition, voice assistants', color: '#8b5cf6' },
    { name: 'Generative AI', desc: 'Creates entirely new content.',
      example: 'ChatGPT, Midjourney, GitHub Copilot', color: '#ec4899' },
  ];
  return (
    <section>
      <h2>🌊 The AI Spectrum — Simple to Sophisticated</h2>
      <p className="section-sub">All of these are still Narrow AI — just increasingly sophisticated.</p>
      <div className="spectrum">
        {items.map((t, i) => (
          <div key={i} className={`spectrum-item ${active === i ? 'active' : ''}`} onClick={() => setActive(i)}>
            <h4>{t.name}</h4>
          </div>
        ))}
      </div>
      <div className="card" style={{ marginTop: '1.5rem' }}>
        <h3>{items[active].name}</h3>
        <p>{items[active].desc}</p>
        <p style={{ fontStyle: 'italic', color: 'var(--primary)' }}>Example: {items[active].example}</p>
      </div>
    </section>
  );
};

const Universe = () => {
  const [active, setActive] = useState(0);
  const levels = [
    {
      name: 'AI', full: 'Artificial Intelligence', icon: '🤖',
      desc: 'The broadest umbrella — any system designed to mimic human intelligence. It encompasses all techniques that enable machines to perform tasks requiring human-like cognition, from simple rule-based systems to advanced neural networks.',
      characteristics: ['Mimics human intelligence', 'Performs cognitive tasks', 'Learns from data or rules', 'Can be narrow or general'],
      examples: [
        { name: 'Virtual Assistants', desc: 'Siri, Alexa — understand voice commands and respond naturally' },
        { name: 'Recommendation Engines', desc: 'Netflix, YouTube — suggest content based on your behavior' },
        { name: 'Autonomous Systems', desc: 'Self-driving cars, delivery drones navigating environments' }
      ],
      didYouKnow: 'The term "Artificial Intelligence" was coined in 1956 by John McCarthy at the Dartmouth Conference — over 70 years ago!',
      color: '#4f46e5', chipClass: ''
    },
    {
      name: 'ML', full: 'Machine Learning', icon: '📊',
      desc: 'A subset of AI where systems learn patterns from data automatically — without being explicitly programmed. The more data you feed it, the better it gets at its task.',
      characteristics: ['Learns from data', 'Improves with experience', 'No explicit programming', 'Pattern recognition'],
      examples: [
        { name: 'Netflix Recommendations', desc: 'Learns your viewing preferences to suggest shows you\'ll love' },
        { name: 'Spam Filters', desc: 'Gmail learns from millions of emails to catch spam automatically' },
        { name: 'Smart Home Assistants', desc: 'Alexa learns your routines and preferences over time' }
      ],
      didYouKnow: 'Arthur Samuel coined "Machine Learning" in 1959 while building a checkers program that improved by playing against itself!',
      color: '#0891b2', chipClass: 'teal'
    },
    {
      name: 'DL', full: 'Deep Learning', icon: '🧠',
      desc: 'A specialized form of ML using neural networks with many layers (hence "deep"). It mimics how the human brain processes information — excelling at complex tasks like vision and speech.',
      characteristics: ['Neural networks', 'Multiple processing layers', 'Mimics human brain', 'Handles complex patterns'],
      examples: [
        { name: 'Self-Driving Cars', desc: 'Recognizes roads, traffic signs, pedestrians, and obstacles in real-time' },
        { name: 'Face Recognition', desc: 'Unlocks your phone by learning unique facial features' },
        { name: 'Medical Imaging', desc: 'Detects tumors in X-rays with accuracy rivaling expert radiologists' }
      ],
      didYouKnow: 'Deep learning breakthroughs in 2012 (AlexNet) sparked the modern AI revolution — accuracy on ImageNet jumped from 74% to 85% overnight!',
      color: '#7c3aed', chipClass: 'purple'
    },
    {
      name: 'GenAI', full: 'Generative AI', icon: '🎨',
      desc: 'AI that creates entirely new content — text, images, video, music, code — based on patterns learned from massive datasets. It doesn\'t just analyze; it creates.',
      characteristics: ['Creates new content', 'Multimodal output', 'Learns from massive data', 'Original generation'],
      examples: [
        { name: 'ChatGPT / Claude', desc: 'Conversational AI that writes, reasons, and assists with complex tasks' },
        { name: 'DALL·E / Midjourney', desc: 'Generate stunning images from text descriptions in seconds' },
        { name: 'GitHub Copilot', desc: 'Writes and completes code based on natural language comments' },
        { name: 'Synthesia', desc: 'Creates AI-generated videos with realistic avatars speaking any language' }
      ],
      didYouKnow: 'Generative AI crossed $1 trillion in market value by 2025 — the fastest-growing tech segment in history!',
      color: '#db2777', chipClass: 'pink'
    },
    {
      name: 'LLM', full: 'Large Language Models', icon: '💬',
      desc: 'A type of GenAI trained on massive text data to understand and generate human language. They predict the next word (token) based on context — billions of predictions create coherent, useful responses.',
      characteristics: ['Trained on billions of documents', 'Trillions of parameters', 'Predicts next token', 'Emergent reasoning abilities'],
      examples: [
        { name: 'GPT-4 (OpenAI)', desc: 'Powers ChatGPT — excels at reasoning, coding, and creative writing' },
        { name: 'Claude (Anthropic)', desc: 'Designed for safety and helpfulness — strong at analysis and long documents' },
        { name: 'Gemini (Google)', desc: 'Multimodal model understanding text, images, and code together' },
        { name: 'Llama (Meta)', desc: 'Open-source model anyone can run and customize' }
      ],
      didYouKnow: 'GPT-4 was trained on an estimated 1.8 trillion tokens — that\'s roughly equivalent to reading every book ever written, multiple times over!',
      color: '#059669', chipClass: 'green'
    },
  ];

  // Layout: center + 5 nodes in a circle
  const cx = 450, cy = 290, radius = 210;
  const nodes = levels.map((l, i) => {
    const angle = (i * 2 * Math.PI / 5) - Math.PI / 2;
    return {
      ...l,
      x: cx + radius * Math.cos(angle),
      y: cy + radius * Math.sin(angle),
      idx: i
    };
  });

  const current = active >= 0 ? levels[active] : null;

  return (
    <section>
      <h2>🌌 The AI Universe — Interactive Mindmap</h2>
      <p className="section-sub">Click any node to explore the hierarchy of AI technologies. Each layer builds upon the one above it — from the broad umbrella of AI down to specialized tools like LLMs.</p>

      <div className="mindmap-container">
        <svg className="mindmap-svg" viewBox="0 0 900 580" preserveAspectRatio="xMidYMid meet">
          <defs>
            <linearGradient id="lineGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stopColor="#4f46e5" />
              <stop offset="100%" stopColor="#db2777" />
            </linearGradient>
            <radialGradient id="centerGlow">
              <stop offset="0%" stopColor="rgba(79,70,229,0.15)" />
              <stop offset="100%" stopColor="rgba(79,70,229,0)" />
            </radialGradient>
            <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
              <feOffset dx="0" dy="3" result="offsetblur"/>
              <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
              <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>

          {/* Background glow */}
          <circle cx={cx} cy={cy} r="260" fill="url(#centerGlow)" />

          {/* Curved connection lines */}
          {nodes.map((n, i) => {
            const midX = (cx + n.x) / 2;
            const midY = (cy + n.y) / 2;
            const ctrlX = midX + (n.y - cy) * 0.15;
            const ctrlY = midY - (n.x - cx) * 0.15;
            return (
              <path
                key={`line-${i}`}
                d={`M ${cx} ${cy} Q ${ctrlX} ${ctrlY} ${n.x} ${n.y}`}
                className={`connection-line ${active === i ? 'active' : ''}`}
                strokeDasharray={active === i ? '0' : '6 6'}
              />
            );
          })}

          {/* Center node */}
          <g className="mindmap-node" onClick={() => setActive(-1)} filter="url(#softShadow)">
            <circle cx={cx} cy={cy} r="75" fill="url(#lineGradient)"
              className={`node-circle ${active === -1 ? 'active' : ''}`}
              stroke="white" strokeWidth="4" />
            <text x={cx} y={cy - 5} className="node-icon" style={{ fill: 'white', fontSize: '32px' }}>🌐</text>
            <text x={cx} y={cy + 25} style={{ fill: 'white', fontSize: '14px', fontWeight: 800, textAnchor: 'middle', pointerEvents: 'none' }}>AI UNIVERSE</text>
          </g>

          {/* Outer nodes with external labels */}
          {nodes.map((n, i) => (
            <g key={i} className="mindmap-node" onClick={() => setActive(i)} filter="url(#softShadow)">
              <circle cx={n.x} cy={n.y} r="62" fill={n.color}
                className={`node-circle ${active === i ? 'active' : ''}`}
                stroke="white" strokeWidth="4" />
              <text x={n.x} y={n.y + 2} className="node-icon" style={{ fill: 'white' }}>{n.icon}</text>
              <text x={n.x} y={n.y + 28} style={{ fill: 'white', fontSize: '13px', fontWeight: 800, textAnchor: 'middle', pointerEvents: 'none' }}>{n.name}</text>

              {/* External label below node */}
              <text x={n.x} y={n.y + 85} className="node-label">{n.name}</text>
              <text x={n.x} y={n.y + 102} className="node-sublabel">{n.full.split(' ').slice(0, 2).join(' ')}</text>
            </g>
          ))}
        </svg>
      </div>

      {/* Rich Details Panel */}
      {current ? (
        <div className="mindmap-details" key={active}>
          <div className="mindmap-header" style={{ background: `linear-gradient(135deg, ${current.color}, ${current.color}dd)` }}>
            <div className="mindmap-header-icon">{current.icon}</div>
            <div className="mindmap-header-text">

const PromptLab = () => {
  const [level, setLevel] = useState('good');
  const [role, setRole] = useState('experienced marketing strategist');
  const [context, setContext] = useState('working with a SaaS startup selling to remote teams');
  const [task, setTask] = useState('Create a 3-month content marketing plan');
  const [constraints, setConstraints] = useState('table format, budget under Rs 5K, exclude paid ads');

  const output = `📋 ROLE: You are an ${role}.

🎯 CONTEXT: ${context}.

✅ TASK: ${task}.

⚙️ CONSTRAINTS: ${constraints}.

─────────────────────────────────────
✨ COMBINED PROMPT:
─────────────────────────────────────
"You are an ${role}, ${context}. ${task}. Format as ${constraints}."

💡 Golden Rule: The quality of your output is directly
proportional to the quality of your input.`;

  return (
    <section>
      <h2>✍️ The Prompt Engineering Lab</h2>
      <p className="section-sub">
        The <strong>RCTC Framework</strong>: Role + Context + Task + Constraints. Edit the fields below to build a perfect prompt.
      </p>

      <div className="prompt-lab">
        <div style={{ display: 'flex', gap: '0.5rem', marginBottom: '1rem', flexWrap: 'wrap' }}>
          <button className={`nav-btn ${level === 'basic' ? 'active' : ''}`} onClick={() => setLevel('basic')}>🔸 Basic</button>
          <button className={`nav-btn ${level === 'clear' ? 'active' : ''}`} onClick={() => setLevel('clear')}>🔷 Clear</button>
          <button className={`nav-btn ${level === 'good' ? 'active' : ''}`} onClick={() => setLevel('good')}>💎 Good (RCTC)</button>
        </div>

        {level === 'basic' && (
          <div className="level basic" style={{ marginBottom: '1rem' }}>
            <div className="level-badge">BASIC</div>
            <div className="level-content">
              <p style={{ margin: 0 }}>Vague, generic — produces unfocused output.</p>
              <code>"Make a marketing plan"</code>
            </div>
          </div>
        )}
        {level === 'clear' && (
          <div className="level clear" style={{ marginBottom: '1rem' }}>
            <div className="level-badge">CLEAR</div>
            <div className="level-content">
              <p style={{ margin: 0 }}>Adds domain and context.</p>
              <code>"Give me a strategy for XYZ NGO in Water & Sanitation in UP to grow."</code>
            </div>
          </div>
        )}
        {level === 'good' && (
          <>
            <div className="prompt-field">
              <label>👤 ROLE — Who should the AI act as?</label>
              <input value={role} onChange={e => setRole(e.target.value)} />
            </div>
            <div className="prompt-field">
              <label>📖 CONTEXT — Background information</label>
              <input value={context} onChange={e => setContext(e.target.value)} />
            </div>
            <div className="prompt-field">
              <label>🎯 TASK — What exactly to do?</label>
              <textarea value={task} onChange={e => setTask(e.target.value)} />
            </div>
            <div className="prompt-field">
              <label>⚙️ CONSTRAINTS — Format, tone, length, exclusions</label>
              <textarea value={constraints} onChange={e => setConstraints(e.target.value)} />
            </div>
          </>
        )}

        {level === 'good' && (
          <>
            <div className="prompt-output-label">🔮 Your Perfect Prompt</div>
            <div className="prompt-output">{output}</div>
          </>
        )}
      </div>

      <div className="card" style={{ marginTop: '1.5rem' }}>
        <h3>💡 Pro Tip: Searching vs. Instructing</h3>
        <p><strong>Search mindset (Google):</strong> "best Python tutorial" → sift through 10 blue links → you do the work.</p>
        <p><strong>Instruct mindset (AI):</strong> "Teach me Python basics as a 2-hour curriculum with practice exercises for a beginner" → receive a structured, ready-to-use curriculum.</p>
        <p style={{ fontStyle: 'italic' }}>Context + Specificity = Dramatically better output.</p>
      </div>
    </section>
  );
};

const Quiz = () => {
  const questions = [
    { q: '1. AI learns by...', options: ['Being programmed with rules', 'Finding patterns in data', 'Reading textbooks'], answer: 1 },
    { q: '2. Which is NOT an AI concern?', options: ['Data privacy', 'AI bias', 'Making work easier'], answer: 2 },
    { q: '3. Best practice with AI output?', options: ['Use it immediately without review', 'Always review before using', 'Trust it completely'], answer: 1 },
    { q: '4. AI can help humans with...', options: ['All of these!', 'Faster Documentation', 'Quick Research'], answer: 0 },
    { q: '5. When sharing personal/org data...', options: ['Share everything for better results', 'Use anonymized data only', 'Include names and IDs'], answer: 1 },
    { q: '6. AI in offices should...', options: ['Replace all human resources', "Support staff's work", 'Make decisions'], answer: 1 },
  ];

  const [current, setCurrent] = useState(0);
  const [answers, setAnswers] = useState([]);
  const [selected, setSelected] = useState(null);
  const [showResult, setShowResult] = useState(false);

  const handleAnswer = (idx) => {
    if (selected !== null) return;
    setSelected(idx);
    setAnswers([...answers, idx]);
    setTimeout(() => {
      if (current + 1 < questions.length) {
        setCurrent(current + 1);
        setSelected(null);
      } else {
        setShowResult(true);
      }
    }, 1200);
  };

  const restart = () => {
    setCurrent(0); setAnswers([]); setSelected(null); setShowResult(false);
  };

  const score = answers.filter((a, i) => a === questions[i].answer).length;

  if (showResult) {
    return (
      <section>
        <h2>🎉 Quiz Complete!</h2>
        <div className="quiz-score">
          <h3>{score} / {questions.length}</h3>
          <p>
            {score === questions.length ? "🏆 Perfect! You're an AI pro!" :
             score >= questions.length * 0.7 ? "🌟 Great job! You've got the fundamentals down." :
             "📚 Keep learning — revisit the sections and try again!"}
          </p>
        </div>
        <button className="cta-btn" style={{ marginTop: '1.5rem' }} onClick={restart}>
          🔄 Restart Quiz
        </button>
      </section>
    );
  }

  const q = questions[current];
  return (
    <section>
      <h2>🎯 Grand Finale Quiz</h2>
      <div className="quiz-card">
        <div className="quiz-progress">
          <span>Question {current + 1} of {questions.length}</span>
          <span>Score: {answers.filter((a, i) => a === questions[i].answer).length}</span>
        </div>
        <div className="quiz-question">{q.q}</div>
        <div className="quiz-options">
          {q.options.map((opt, i) => {
            let cls = 'quiz-option';
            if (selected !== null) {
              if (i === q.answer) cls += ' correct';
              else if (i === selected) cls += ' wrong';
            }
            return (
              <button key={i} className={cls} onClick={() => handleAnswer(i)} disabled={selected !== null}>
                {opt}
              </button>
            );
          })}
        </div>
      </div>
    </section>
  );
};

};
